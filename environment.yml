name: evolveai
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.10
  - pip

  # Core scientific
  - numpy=1.26.*
  - scipy=1.11.*
  - pandas=2.1.*

  # Visualization
  - matplotlib=3.8.*
  - plotly=5.18.*
  - seaborn=0.13.*

  # Pygame
  - pygame=2.5.*

  # ML utilities
  - scikit-learn=1.3.*
  - tqdm
  - pyyaml

  # Development
  - jupyter
  - pytest
  - black
  - ruff

  - pip:
    # PyTorch CUDA 12.8 — RTX 5070 Blackwell (SM 120) zorunlu
    # conda pytorch kanalı yanlış versiyon çeker, pip kullan!
    - --extra-index-url https://download.pytorch.org/whl/cu128
    - torch
    - torchvision
    - gradio==4.19.2
    - tensorboard
    - optuna==3.5.0
    - rich
    - gymnasium==0.29.1